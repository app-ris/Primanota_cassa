<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Primanota Cassa</title>
<meta name="theme-color" content="#1c2b39" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#1c2b39;
    --ink-soft:#3c4c5c;
    --paper:#f7f5ef;
    --paper-deep:#efece2;
    --brass:#ab8b3c;
    --brass-dark:#8a6f2c;
    --line:#d8d3c4;
    --success:#2f6f4e;
    --success-bg:#e8f1ec;
    --danger:#a23b32;
    --danger-bg:#f7e9e7;
    --muted:#6b7280;
    --radius:10px;
    --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, #24374a 0%, transparent 45%),
      var(--ink);
    font-family:var(--sans);
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }

  .app{
    width:100%;
    max-width:480px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:22px;
    padding:0 4px;
  }
  .brand-mark{
    width:38px;height:38px;border-radius:9px;
    background:var(--brass);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:600;color:var(--ink);
    font-size:18px;
    flex-shrink:0;
  }
  .brand-text h1{
    font-size:17px;margin:0;color:#f7f5ef;letter-spacing:.2px;
  }
  .brand-text p{
    margin:2px 0 0;font-size:12px;color:#9fb0be;
  }

  .card{
    background:var(--paper);
    border-radius:var(--radius);
    padding:24px;
    box-shadow:0 18px 40px -18px rgba(0,0,0,.55);
  }

  .field{
    margin-bottom:18px;
  }
  .field label{
    display:block;
    font-size:12px;
    font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:8px;
  }

  .file-row{
    display:flex;
    gap:10px;
  }
  .file-name{
    flex:1;
    display:flex;
    align-items:center;
    padding:0 12px;
    border:1px dashed var(--line);
    border-radius:8px;
    font-size:13px;
    color:var(--muted);
    background:#fff;
    min-width:0;
  }
  .file-name span{
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .file-name.filled{
    color:var(--ink);
    border-style:solid;
    border-color:var(--brass);
  }

  input[type="file"]{ display:none; }

  button{
    font-family:var(--sans);
    cursor:pointer;
    border:none;
  }

  .btn-choose{
    background:var(--ink);
    color:#fff;
    padding:0 16px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
  }
  .btn-choose:hover{ background:var(--ink-soft); }

  .btn-primary{
    width:100%;
    background:var(--brass);
    color:var(--ink);
    padding:13px 16px;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    letter-spacing:.02em;
    transition:transform .12s ease, background .15s ease;
  }
  .btn-primary:hover:not(:disabled){ background:var(--brass-dark); }
  .btn-primary:active:not(:disabled){ transform:scale(.99); }
  .btn-primary:disabled{
    background:#cdc6ac;
    color:#8b8672;
    cursor:not-allowed;
  }

  .btn-primary .spinner{
    display:inline-block;
    width:14px;height:14px;
    border:2px solid rgba(28,43,57,.35);
    border-top-color:var(--ink);
    border-radius:50%;
    margin-right:8px;
    vertical-align:-2px;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .result-wrap{
    margin-top:22px;
  }
  .result-wrap.hidden{ display:none; }

  .receipt{
    position:relative;
    background:#fffefb;
    border-radius:2px;
    padding:20px 18px 22px;
    box-shadow:0 10px 24px -14px rgba(0,0,0,.4);
  }
  .receipt::before{
    content:"";
    position:absolute;
    top:-6px; left:0; right:0; height:12px;
    background-image: radial-gradient(circle, var(--ink) 4px, transparent 4.5px);
    background-position: 0 0;
    background-size: 16px 12px;
    background-repeat: repeat-x;
    -webkit-mask-image: linear-gradient(to bottom, transparent 50%, black 50%);
    mask-image: linear-gradient(to bottom, transparent 50%, black 50%);
  }
  .receipt-status{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:999px;
    margin-bottom:12px;
  }
  .receipt-status.ok{ background:var(--success-bg); color:var(--success); }
  .receipt-status.err{ background:var(--danger-bg); color:var(--danger); }

  .receipt pre{
    font-family:var(--mono);
    font-size:13px;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
    margin:0;
    color:var(--ink);
  }

  .downloads{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .btn-ghost{
    flex:1;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-size:12.5px;
    font-weight:600;
    padding:10px 8px;
    border-radius:8px;
  }
  .btn-ghost:hover:not(:disabled){
    border-color:var(--brass);
    color:var(--ink);
  }
  .btn-ghost:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .foot-note{
    text-align:center;
    font-size:11px;
    color:#8ea0ae;
    margin-top:18px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="brand">
    <div class="brand-mark">C</div>
    <div class="brand-text">
      <h1>Primanota Cassa</h1>
      <p>Invio file a Wigest &middot; bapp_cassa_ws</p>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label for="fileInput">File da caricare</label>
      <div class="file-row">
        <div class="file-name" id="fileNameBox"><span id="fileNameText">Nessun file selezionato</span></div>
        <button type="button" class="btn-choose" id="chooseBtn">Scegli file</button>
      </div>
      <input type="file" id="fileInput" />
    </div>

    <button type="button" class="btn-primary" id="sendBtn" disabled>Invia a Wigest</button>

    <div class="result-wrap hidden" id="resultWrap">
      <div class="receipt" id="receipt">
        <span class="receipt-status" id="receiptStatus">Esito</span>
        <pre id="receiptText"></pre>
      </div>
      <div class="downloads">
        <button type="button" class="btn-ghost" id="downloadReq" disabled>Scarica richiesta (.txt)</button>
        <button type="button" class="btn-ghost" id="downloadResp" disabled>Scarica risposta (.txt)</button>
      </div>
    </div>
  </div>

  <p class="foot-note">Wigest 617 &middot; SERVLET_WIGEST_AMICIGIGI_1105</p>
</div>

<script>
(function(){
  "use strict";

  const WS_URL = "https://www.lucchi.com:448/wigest617/servlet/bapp_cassa_ws";

  const fileInput = document.getElementById("fileInput");
  const chooseBtn = document.getElementById("chooseBtn");
  const fileNameBox = document.getElementById("fileNameBox");
  const fileNameText = document.getElementById("fileNameText");
  const sendBtn = document.getElementById("sendBtn");
  const resultWrap = document.getElementById("resultWrap");
  const receipt = document.getElementById("receipt");
  const receiptStatus = document.getElementById("receiptStatus");
  const receiptText = document.getElementById("receiptText");
  const downloadReqBtn = document.getElementById("downloadReq");
  const downloadRespBtn = document.getElementById("downloadResp");

  let selectedFile = null;
  let lastRequestXML = "";
  let lastResponseXML = "";

  chooseBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", () => {
    selectedFile = fileInput.files[0] || null;
    if (selectedFile) {
      fileNameText.textContent = selectedFile.name;
      fileNameBox.classList.add("filled");
      sendBtn.disabled = false;
    } else {
      fileNameText.textContent = "Nessun file selezionato";
      fileNameBox.classList.remove("filled");
      sendBtn.disabled = true;
    }
  });

  function readFileAsBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        // reader.result is "data:<mime>;base64,AAAA..." -> strip the prefix
        const commaIndex = reader.result.indexOf(",");
        resolve(reader.result.substring(commaIndex + 1));
      };
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  function escapeXml(str){
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function buildEnvelope(nomeFile, fileBase64){
    return `<?xml version="1.0" encoding="UTF-8" standalone="no" ?>
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:bgla="http://bapp_cassa_ws.ws.localhost/">
   <soapenv:Header/>
   <soapenv:Body>
      <bgla:bapp_cassa_ws_Run>
         <bgla:m_UserName>ws</bgla:m_UserName>
         <bgla:m_Password>ws_1234!</bgla:m_Password>
         <bgla:m_Instance>SERVLET_WIGEST_AMICIGIGI_1105</bgla:m_Instance>
         <bgla:p_User>5</bgla:p_User>
         <bgla:p_Password>gla_DEC_2016</bgla:p_Password>
         <bgla:p_NomeFile>${escapeXml(nomeFile)}</bgla:p_NomeFile>
         <bgla:p_FileBase64>${fileBase64}</bgla:p_FileBase64>
         <bgla:p_utentecassa>119</bgla:p_utentecassa>
      </bgla:bapp_cassa_ws_Run>
   </soapenv:Body>
</soapenv:Envelope>`;
  }

  // Find the first element anywhere in the doc matching a local name,
  // regardless of namespace prefix (SOAP responses often carry one).
  function findByLocalName(root, name){
    const all = root.getElementsByTagName("*");
    for (let i = 0; i < all.length; i++){
      if (all[i].localName === name || all[i].nodeName === name) return all[i];
    }
    return null;
  }

  function textOf(el){
    return el ? el.textContent.trim() : "";
  }

  function showResult(kind, text){
    resultWrap.classList.remove("hidden");
    receiptStatus.classList.remove("ok", "err");
    if (kind === "ok"){
      receiptStatus.classList.add("ok");
      receiptStatus.textContent = "WSCODE 1 · OK";
    } else if (kind === "err"){
      receiptStatus.classList.add("err");
      receiptStatus.textContent = "WSCODE 2 · Errore";
    } else {
      receiptStatus.classList.add("err");
      receiptStatus.textContent = "Esito non riconosciuto";
    }
    receiptText.textContent = text;
    receipt.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function downloadText(filename, content){
    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  downloadReqBtn.addEventListener("click", () => {
    if (lastRequestXML) downloadText("richiesta_bapp_cassa_ws.txt", lastRequestXML);
  });
  downloadRespBtn.addEventListener("click", () => {
    if (lastResponseXML) downloadText("risposta_bapp_cassa_ws.txt", lastResponseXML);
  });

  sendBtn.addEventListener("click", async () => {
    if (!selectedFile) return;

    sendBtn.disabled = true;
    sendBtn.innerHTML = '<span class="spinner"></span>Invio in corso&hellip;';
    downloadReqBtn.disabled = true;
    downloadRespBtn.disabled = true;

    try {
      const base64 = await readFileAsBase64(selectedFile);
      const requestXML = buildEnvelope(selectedFile.name, base64);
      lastRequestXML = requestXML;

      const response = await fetch(WS_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/xml; charset=utf-8"
          // Alcuni server SOAP richiedono anche l'header SOAPAction:
          // "SOAPAction": "\"\""
        },
        body: requestXML
      });

      const responseText = await response.text();
      lastResponseXML = responseText;
      downloadReqBtn.disabled = false;
      downloadRespBtn.disabled = false;

      if (!response.ok){
        showResult("err", `Errore HTTP ${response.status} ${response.statusText}\n\n${responseText}`);
        return;
      }

      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(responseText, "text/xml");

      const parserError = xmlDoc.getElementsByTagName("parsererror")[0];
      if (parserError){
        showResult("err", "La risposta ricevuta non è un XML valido:\n\n" + responseText);
        return;
      }

      const wscodeEl = findByLocalName(xmlDoc, "WSCODE");
      const wscode = textOf(wscodeEl);

      if (wscode === "1"){
        const descr = textOf(findByLocalName(xmlDoc, "WSDESCR"));
        showResult("ok", descr || "(WSDESCR vuoto)");
      } else if (wscode === "2"){
        const wserr = textOf(findByLocalName(xmlDoc, "WSERR"));
        const cassaEl = findByLocalName(xmlDoc, "Cassa");
        const filename = textOf(cassaEl && findByLocalName(cassaEl, "Filename"));
        const risultato = textOf(cassaEl && findByLocalName(cassaEl, "risultato"));
        const messaggio = textOf(cassaEl && findByLocalName(cassaEl, "messaggio"));
        const lines = [
          wserr || "(WSERR vuoto)",
          "",
          `Filename: ${filename}`,
          `risultato: ${risultato}`,
          `messaggio: ${messaggio}`
        ];
        showResult("err", lines.join("\n"));
      } else {
        showResult("unknown", `WSCODE non riconosciuto (${wscode || "assente"}).\n\nRisposta completa:\n${responseText}`);
      }

    } catch (err){
      showResult("err", "Chiamata al web service non riuscita.\n\n" + (err && err.message ? err.message : String(err)));
      downloadReqBtn.disabled = !lastRequestXML;
      downloadRespBtn.disabled = !lastResponseXML;
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = "Invia a Wigest";
    }
  });

  if ("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
})();
</script>
</body>
</html>
