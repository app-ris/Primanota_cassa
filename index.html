<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Primanota Cassa</title>
<meta name="theme-color" content="#1c2b39" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#1c2b39;
    --ink-soft:#3c4c5c;
    --paper:#f7f5ef;
    --paper-deep:#efece2;
    --brass:#ab8b3c;
    --brass-dark:#8a6f2c;
    --line:#d8d3c4;
    --success:#2f6f4e;
    --success-bg:#e8f1ec;
    --danger:#a23b32;
    --danger-bg:#f7e9e7;
    --muted:#6b7280;
    --radius:10px;
    --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, #24374a 0%, transparent 45%),
      var(--ink);
    font-family:var(--sans);
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }

  .app{
    width:100%;
    max-width:480px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:22px;
    padding:0 4px;
  }
  .brand-mark{
    width:38px;height:38px;border-radius:9px;
    background:var(--brass);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:600;color:var(--ink);
    font-size:18px;
    flex-shrink:0;
  }
  .brand-text h1{
    font-size:17px;margin:0;color:#f7f5ef;letter-spacing:.2px;
  }
  .brand-text p{
    margin:2px 0 0;font-size:12px;color:#9fb0be;
  }

  .card{
    background:var(--paper);
    border-radius:var(--radius);
    padding:24px;
    box-shadow:0 18px 40px -18px rgba(0,0,0,.55);
  }

  .field{
    margin-bottom:18px;
  }
  .field label{
    display:block;
    font-size:12px;
    font-weight:600;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:8px;
  }

  .btn-view{
    display:block;
    width:100%;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-soft);
    padding:9px 12px;
    border-radius:8px;
    font-size:12.5px;
    font-weight:600;
    margin-bottom:8px;
  }
  .btn-view:hover:not(:disabled){
    border-color:var(--brass);
    color:var(--ink);
  }
  .btn-view:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .file-row{
    display:flex;
    gap:10px;
  }
  .file-name{
    flex:1;
    display:flex;
    align-items:center;
    padding:0 12px;
    border:1px dashed var(--line);
    border-radius:8px;
    font-size:13px;
    color:var(--muted);
    background:#fff;
    min-width:0;
  }
  .file-name span{
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .file-name.filled{
    color:var(--ink);
    border-style:solid;
    border-color:var(--brass);
  }

  input[type="file"]{ display:none; }

  button{
    font-family:var(--sans);
    cursor:pointer;
    border:none;
  }

  .btn-choose{
    background:var(--ink);
    color:#fff;
    padding:0 16px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
  }
  .btn-choose:hover{ background:var(--ink-soft); }

  .btn-primary{
    width:100%;
    background:var(--brass);
    color:var(--ink);
    padding:13px 16px;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    letter-spacing:.02em;
    transition:transform .12s ease, background .15s ease;
  }
  .btn-primary:hover:not(:disabled){ background:var(--brass-dark); }
  .btn-primary:active:not(:disabled){ transform:scale(.99); }
  .btn-primary:disabled{
    background:#cdc6ac;
    color:#8b8672;
    cursor:not-allowed;
  }

  .btn-primary .spinner{
    display:inline-block;
    width:14px;height:14px;
    border:2px solid rgba(28,43,57,.35);
    border-top-color:var(--ink);
    border-radius:50%;
    margin-right:8px;
    vertical-align:-2px;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .result-wrap{
    margin-top:22px;
  }
  .result-wrap.hidden{ display:none; }

  .receipt{
    position:relative;
    background:#fffefb;
    border-radius:2px;
    padding:20px 18px 22px;
    box-shadow:0 10px 24px -14px rgba(0,0,0,.4);
  }
  .receipt::before{
    content:"";
    position:absolute;
    top:-6px; left:0; right:0; height:12px;
    background-image: radial-gradient(circle, var(--ink) 4px, transparent 4.5px);
    background-position: 0 0;
    background-size: 16px 12px;
    background-repeat: repeat-x;
    -webkit-mask-image: linear-gradient(to bottom, transparent 50%, black 50%);
    mask-image: linear-gradient(to bottom, transparent 50%, black 50%);
  }
  .receipt-status{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:999px;
    margin-bottom:12px;
  }
  .receipt-status.ok{ background:var(--success-bg); color:var(--success); }
  .receipt-status.err{ background:var(--danger-bg); color:var(--danger); }

  .receipt pre{
    font-family:var(--mono);
    font-size:13px;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
    margin:0;
    color:var(--ink);
  }

  .downloads{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .btn-ghost{
    flex:1;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-size:12.5px;
    font-weight:600;
    padding:10px 8px;
    border-radius:8px;
  }
  .btn-ghost:hover:not(:disabled){
    border-color:var(--brass);
    color:var(--ink);
  }
  .btn-ghost:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .panels{
    margin-top:16px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .panel{
    border:1px solid var(--line);
    border-radius:8px;
    background:#fffefb;
    overflow:hidden;
  }
  .panel summary{
    list-style:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:10px 14px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.03em;
    text-transform:uppercase;
    color:var(--ink-soft);
    background:var(--paper-deep);
  }
  .panel summary::-webkit-details-marker{ display:none; }
  .panel summary .chev{
    font-size:11px;
    color:var(--brass-dark);
    transition:transform .15s ease;
  }
  .panel[open] summary .chev{ transform:rotate(90deg); }
  .panel pre{
    margin:0;
    padding:14px;
    font-family:var(--mono);
    font-size:11.5px;
    line-height:1.55;
    white-space:pre-wrap;
    word-break:break-all;
    max-height:220px;
    overflow-y:auto;
    color:var(--ink);
  }
  .panel .empty{
    color:var(--muted);
    font-style:italic;
  }

  .foot-note{
    text-align:center;
    font-size:11px;
    color:#8ea0ae;
    margin-top:18px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="brand">
    <div class="brand-mark">C</div>
    <div class="brand-text">
      <h1>Primanota Cassa</h1>
      <p>Invio file a Primanota di cassa</p>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label for="fileInput">File da caricare</label>
      <button type="button" class="btn-view" id="viewFileBtn" disabled>Visualizza file caricato</button>
      <div class="file-row">
        <div class="file-name" id="fileNameBox"><span id="fileNameText">Nessun file selezionato</span></div>
        <button type="button" class="btn-choose" id="chooseBtn">Scegli file</button>
      </div>
      <input type="file" id="fileInput" />
    </div>

    <button type="button" class="btn-primary" id="sendBtn" disabled>Invia a Primanota di cassa</button>

    <div class="result-wrap hidden" id="resultWrap">
      <div class="receipt" id="receipt">
        <span class="receipt-status" id="receiptStatus">Esito</span>
        <pre id="receiptText"></pre>
      </div>
      <div class="panels">
        <details class="panel" id="reqPanel">
          <summary>Chiamata inviata <span class="chev">&#9656;</span></summary>
          <pre id="reqPanelText"><span class="empty">Nessuna chiamata effettuata.</span></pre>
        </details>
        <details class="panel" id="respPanel">
          <summary>Risposta ricevuta <span class="chev">&#9656;</span></summary>
          <pre id="respPanelText"><span class="empty">Nessuna risposta ricevuta.</span></pre>
        </details>
      </div>
      <div class="downloads">
        <button type="button" class="btn-ghost" id="downloadReq" disabled>Scarica richiesta (.txt)</button>
        <button type="button" class="btn-ghost" id="downloadResp" disabled>Scarica risposta (.txt)</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const WS_URL = "https://www.lucchi.com:448/wigest617/servlet/bapp_cassa_ws";

  const fileInput = document.getElementById("fileInput");
  const chooseBtn = document.getElementById("chooseBtn");
  const viewFileBtn = document.getElementById("viewFileBtn");
  const fileNameBox = document.getElementById("fileNameBox");
  const fileNameText = document.getElementById("fileNameText");
  const sendBtn = document.getElementById("sendBtn");
  const resultWrap = document.getElementById("resultWrap");
  const receipt = document.getElementById("receipt");
  const receiptStatus = document.getElementById("receiptStatus");
  const receiptText = document.getElementById("receiptText");
  const downloadReqBtn = document.getElementById("downloadReq");
  const downloadRespBtn = document.getElementById("downloadResp");
  const reqPanelText = document.getElementById("reqPanelText");
  const respPanelText = document.getElementById("respPanelText");

  let selectedFile = null;
  let selectedFileUrl = null;
  let lastRequestXML = "";
  let lastResponseXML = "";

  chooseBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", () => {
    if (selectedFileUrl){
      URL.revokeObjectURL(selectedFileUrl);
      selectedFileUrl = null;
    }
    selectedFile = fileInput.files[0] || null;
    if (selectedFile) {
      fileNameText.textContent = selectedFile.name;
      fileNameBox.classList.add("filled");
      sendBtn.disabled = false;
      selectedFileUrl = URL.createObjectURL(selectedFile);
      viewFileBtn.disabled = false;
    } else {
      fileNameText.textContent = "Nessun file selezionato";
      fileNameBox.classList.remove("filled");
      sendBtn.disabled = true;
      viewFileBtn.disabled = true;
    }
  });

  viewFileBtn.addEventListener("click", () => {
    if (selectedFileUrl) window.open(selectedFileUrl, "_blank");
  });

  function readFileAsBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        // reader.result is "data:<mime>;base64,AAAA..." -> strip the prefix
        const commaIndex = reader.result.indexOf(",");
        resolve(reader.result.substring(commaIndex + 1));
      };
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
  }

  function escapeXml(str){
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function buildEnvelope(nomeFile, fileBase64){
    return `<?xml version="1.0" encoding="UTF-8" standalone="no" ?>
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:bapp="http://bapp_cassa_ws.ws.localhost/">
   <soapenv:Header/>
   <soapenv:Body>
      <bapp:bapp_cassa_ws_Run>
         <bapp:m_UserName>ws</bapp:m_UserName>
         <bapp:m_Password>ws_1234!</bapp:m_Password>
         <bapp:m_Company>701</bapp:m_Company>
         <bapp:m_Instance>SERVLET_WIGEST_AMICIGIGI_1105</bapp:m_Instance>
         <bapp:p_user>5</bapp:p_user>
         <bapp:p_ws_call>Y</bapp:p_ws_call>
         <bapp:p_Subs>09701</bapp:p_Subs>
         <bapp:p_Branc>9701</bapp:p_Branc>
         <bapp:p_Sect>01</bapp:p_Sect>
         <bapp:p_Curr>EUR</bapp:p_Curr>
         <bapp:p_PhiSite>009701</bapp:p_PhiSite>
         <bapp:p_PaySite></bapp:p_PaySite>
         <bapp:p_PaySubs></bapp:p_PaySubs>
         <bapp:p_Wareh></bapp:p_Wareh>
         <bapp:p_DefaYearS></bapp:p_DefaYearS>
         <bapp:p_DefaSess></bapp:p_DefaSess>
         <bapp:p_UL></bapp:p_UL>
         <bapp:p_fileName>${escapeXml(nomeFile)}</bapp:p_fileName>
         <bapp:p_fileBase64>${fileBase64}</bapp:p_fileBase64>
         <bapp:p_usercassa>119</bapp:p_usercassa>
      </bapp:bapp_cassa_ws_Run>
   </soapenv:Body>
</soapenv:Envelope>`;
  }

  // Find the first element anywhere in the doc matching a local name,
  // regardless of namespace prefix (SOAP responses often carry one).
  function decodeEntitiesOnce(str){
    const ta = document.createElement("textarea");
    ta.innerHTML = str;
    return ta.value;
  }

  // Some server responses are double-escaped (e.g. "&amp;lt;" instead of "<"),
  // so decode repeatedly until nothing changes (capped to avoid infinite loops).
  function deepDecode(str){
    if (!str) return str;
    let prev = str;
    for (let i = 0; i < 5; i++){
      const next = decodeEntitiesOnce(prev);
      if (next === prev) break;
      prev = next;
    }
    return prev;
  }

  // Find the first element anywhere under root matching a local name,
  // regardless of namespace prefix or letter case (the server has changed
  // casing between versions, so we match case-insensitively for safety).
  function findByLocalName(root, name){
    if (!root) return null;
    const all = root.getElementsByTagName("*");
    const target = name.toLowerCase();
    for (let i = 0; i < all.length; i++){
      const ln = all[i].localName || all[i].nodeName;
      if (ln && ln.toLowerCase() === target) return all[i];
    }
    return null;
  }

  function findAllByLocalName(root, name){
    if (!root) return [];
    const all = root.getElementsByTagName("*");
    const target = name.toLowerCase();
    const results = [];
    for (let i = 0; i < all.length; i++){
      const ln = all[i].localName || all[i].nodeName;
      if (ln && ln.toLowerCase() === target) results.push(all[i]);
    }
    return results;
  }

  function textOf(el){
    return el ? el.textContent.trim() : "";
  }

  function showResult(kind, text, code){
    resultWrap.classList.remove("hidden");
    receiptStatus.classList.remove("ok", "err");
    if (kind === "ok"){
      receiptStatus.classList.add("ok");
      receiptStatus.textContent = `WSCODE ${code} · OK`;
    } else if (kind === "err"){
      receiptStatus.classList.add("err");
      receiptStatus.textContent = `WSCODE ${code} · Errore`;
    } else if (kind === "network"){
      receiptStatus.classList.add("err");
      receiptStatus.textContent = "Chiamata non riuscita (rete/CORS)";
    } else {
      receiptStatus.classList.add("err");
      receiptStatus.textContent = "Esito non riconosciuto";
    }
    receiptText.textContent = text;
    receipt.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function setPanelText(el, content){
    if (content){
      el.textContent = content;
    } else {
      el.innerHTML = '<span class="empty">Nessun contenuto disponibile.</span>';
    }
  }

  function downloadText(filename, content){
    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  downloadReqBtn.addEventListener("click", () => {
    if (lastRequestXML) downloadText("richiesta_bapp_cassa_ws.txt", lastRequestXML);
  });
  downloadRespBtn.addEventListener("click", () => {
    if (lastResponseXML) downloadText("risposta_bapp_cassa_ws.txt", lastResponseXML);
  });

  sendBtn.addEventListener("click", async () => {
    if (!selectedFile) return;

    sendBtn.disabled = true;
    sendBtn.innerHTML = '<span class="spinner"></span>Invio in corso&hellip;';
    downloadReqBtn.disabled = true;
    downloadRespBtn.disabled = true;

    try {
      const base64 = await readFileAsBase64(selectedFile);
      const requestXML = buildEnvelope(selectedFile.name, base64);
      lastRequestXML = requestXML;
      setPanelText(reqPanelText, requestXML);

      const response = await fetch(WS_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/xml; charset=utf-8"
          // Alcuni server SOAP richiedono anche l'header SOAPAction:
          // "SOAPAction": "\"\""
        },
        body: requestXML
      });

      const responseText = await response.text();
      const cleanedResponseText = deepDecode(responseText);
      lastResponseXML = cleanedResponseText;
      setPanelText(respPanelText, cleanedResponseText);
      downloadReqBtn.disabled = false;
      downloadRespBtn.disabled = false;

      if (!response.ok){
        showResult("err", `Errore HTTP ${response.status} ${response.statusText}.\n\nDettagli nel pannello "Risposta ricevuta" qui sotto o nel file scaricabile.`, "?");
        return;
      }

      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(cleanedResponseText, "text/xml");

      const parserError = xmlDoc.getElementsByTagName("parsererror")[0];
      if (parserError){
        showResult("err", "La risposta ricevuta non è un XML valido.\n\nDettagli nel pannello \"Risposta ricevuta\" qui sotto o nel file scaricabile.", "?");
        return;
      }

      // I dati utili sono dentro <Trangws>, non alla radice del documento.
      const trangwsEl = findByLocalName(xmlDoc, "Trangws");
      if (!trangwsEl){
        showResult("unknown", "Impossibile trovare il tag <Trangws> nella risposta.\n\nDettagli nel pannello \"Risposta ricevuta\" qui sotto o nel file scaricabile.", "?");
        return;
      }

      const wscode = deepDecode(textOf(findByLocalName(trangwsEl, "WSCODE")));
      const descr = deepDecode(textOf(findByLocalName(trangwsEl, "WSDESCR")));
      const wserr = deepDecode(textOf(findByLocalName(trangwsEl, "WSERR")));
      const wswar = deepDecode(textOf(findByLocalName(trangwsEl, "WSWAR")));

      // I dettagli per file sono dentro <WSRET><CASSA><row>...</row></CASSA></WSRET>,
      // possono esserci più righe.
      const wsretEl = findByLocalName(trangwsEl, "WSRET");
      const rowEls = findAllByLocalName(wsretEl, "row");
      const rowsText = rowEls.map((rowEl) => {
        const filename = deepDecode(textOf(findByLocalName(rowEl, "FILENAME")));
        const risultato = deepDecode(textOf(findByLocalName(rowEl, "RISULTATO")));
        const messaggio = deepDecode(textOf(findByLocalName(rowEl, "MESSAGGIO")));
        return `Filename: ${filename}\nrisultato: ${risultato}\nmessaggio: ${messaggio}`;
      }).join("\n\n");

      if (wscode === "0"){
        showResult("ok", [descr || "(WSDESCR vuoto)", rowsText].filter(Boolean).join("\n\n"), wscode);
      } else if (wscode === "1"){
        const lines = [wserr || descr || "(nessun messaggio d'errore)"];
        if (wswar) lines.push("Avviso: " + wswar);
        if (rowsText) lines.push("", rowsText);
        showResult("err", lines.join("\n"), wscode);
      } else {
        const lines = [`WSCODE ricevuto: ${wscode || "assente"}`];
        if (descr) lines.push(`WSDESCR: ${descr}`);
        if (wserr) lines.push(`WSERR: ${wserr}`);
        if (wswar) lines.push(`WSWAR: ${wswar}`);
        if (rowsText) lines.push("", rowsText);
        showResult("unknown", lines.join("\n"), wscode || "?");
      }

    } catch (err){
      const isLikelyCors = err instanceof TypeError;
      const hint = isLikelyCors
        ? "Il browser ha bloccato la chiamata prima di ricevere una risposta: quasi sempre è un problema di CORS (il server non restituisce l'header Access-Control-Allow-Origin per questa pagina) oppure di certificato/rete sulla porta 448. Apri la console del browser (F12 -> Console/Network) per il dettaglio esatto: se vedi la scritta \"CORS\" o \"blocked\", il file che gira su GitHub Pages non può leggere la risposta finché il CorsFilter sul Tomcat non la consente esplicitamente."
        : "Errore imprevisto durante l'invio.";
      showResult("network", "Chiamata al web service non riuscita.\n\n" + (err && err.message ? err.message : String(err)) + "\n\n" + hint);
      setPanelText(respPanelText, "");
      downloadReqBtn.disabled = !lastRequestXML;
      downloadRespBtn.disabled = !lastResponseXML;
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = "Invia a Primanota di cassa";
    }
  });

  if ("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
})();
</script>
</body>
</html>
